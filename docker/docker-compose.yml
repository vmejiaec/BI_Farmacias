services:
  mysql:
    image: mysql:8.4
    container_name: bi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: farmacia_db
      MYSQL_USER: victor
      MYSQL_PASSWORD: victor123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro

  postgres:
    image: postgres:16
    container_name: bi_postgres
    environment:
      POSTGRES_DB: farmacia_db
      POSTGRES_USER: victor
      POSTGRES_PASSWORD: victor123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data: